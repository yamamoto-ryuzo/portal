name: Sync to Zenn article

on:
  push:
    paths:
      - 'docs/Project_CDE/index.md'
      - 'docs/books/rag-multiagent-build/**'
      - 'docs/RAG_System/index.md'
      - 'docs/RAG-Build/index.md'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Convert project CDE index to Zenn format
        run: |
          python3 .github/scripts/sync_zenn.py .github/scripts/zenn_config_CDE.yaml

      - name: Prepare RAG multiagent book for Zenn
        run: |
          python3 .github/scripts/prepare_zenn_book.py docs/books/rag-multiagent-build books/rag-multiagent-build

      - name: Convert RAG index to Zenn format
        run: |
          python3 .github/scripts/sync_zenn.py .github/scripts/zenn_config_rag.yaml

      - name: Convert RAG Build index to Zenn format
        run: |
          python3 .github/scripts/sync_zenn.py .github/scripts/zenn_config_build.yaml

      - name: Commit and push Zenn content
        run: |
          ls -la articles || true
          ls -la books || true
          git status --porcelain || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/project-cde-guide.md || true
          git add articles/rag-multiagent-build-summary.md || true
          git add books/rag-multiagent-build || true
          git diff --cached --quiet || (git commit -m "chore: sync Zenn content" && git push)
