name: Sync to Zenn article

on:
  push:
    paths:
      - 'プロジェクトCDE/index.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Convert index.md to Zenn format
        run: |
          python3 .github/scripts/sync_zenn.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/project-cde-guide.md
          git diff --cached --quiet || git commit -m "chore: sync project-cde article from index.md"
          git push
