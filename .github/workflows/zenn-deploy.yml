name: Deploy Zenn to Zenn.dev

on:
  push:
    paths:
      - 'docs/RAG_System/INDEX.md'
      - 'zenn.json'
      - '.github/workflows/zenn-deploy.yml'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate rag-multiagent-guide-summary.md from INDEX.md
        run: |
          python3 .github/scripts/sync_zenn.py .github/scripts/zenn_config_rag.yaml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Zenn CLI
        run: npm install -g zenn-cli

      - name: Publish to Zenn.dev
        env:
          ZENN_TOKEN: ${{ secrets.ZENN_TOKEN }}
        run: |
          zenn preview &
          sleep 10
          zenn deploy
