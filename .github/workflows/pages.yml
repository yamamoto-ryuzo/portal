name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug: show workspace and docs
        run: |
          echo "PWD: $(pwd)"
          echo "Top-level files:"
          ls -la
          echo "docs contents (if present):"
          ls -la docs || echo "docs directory not present"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - uses: actions/deploy-pages@v1
